<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-index">
    <div class="upload-box">
        <div class="icon">📉</div>
        <h1>Customer Churn Predictor</h1>
        <p class="subtitle">Upload a customer CSV file to predict churn risk using XGBoost + SHAP</p>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control file-input" accept=".csv" required>
            <br>
            <button type="submit" class="btn-predict">🔍 Predict Churn</button>
        </form>

        <div class="hint">
            <p>📋 Expected columns include: <code>customerID, tenure, MonthlyCharges, TotalCharges, Churn</code> etc.</p>
            <p>Use the IBM Telco Customer Churn dataset from Kaggle.</p>
        </div>
    </div>
</body>
</html>
